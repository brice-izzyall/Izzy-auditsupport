<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izzy All — Audit Maturité Support Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;min-height:100%;}
    body{background:#F4F8FB;}
    button{font-family:inherit;}

    /* Le footer d'impression reste caché à l'écran */
    .print-footer{display:none;}
    .print-footer-inline{display:none;}

    /* ─── RESPONSIVE MOBILE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Wrapper : réduit le padding latéral */
      .page-wrap{padding:0 16px !important;}

      /* Header */
      .app-header{padding:14px 16px !important;}
      .app-header-status{display:none !important;}

      /* Hero landing : titre plus petit */
      .hero-title{font-size:38px !important; line-height:1.05 !important;}
      .hero-features{grid-template-columns:1fr !important;}
      .hero-features > div{border-right:none !important; border-bottom:1px solid #CDD9E3;}
      .hero-features > div:last-child{border-bottom:none;}
      .hero-bg-logo{display:none !important;}

      /* Formulaire */
      .form-step-title{font-size:32px !important;}
      .form-card-options{grid-template-columns:1fr !important;}

      /* Résultats — hero passe en single column */
      .hero-grid{grid-template-columns:1fr !important; gap:32px !important;}
      .score-big{font-size:96px !important;}

      /* Toutes les grilles multi-colonnes deviennent stack */
      .stat-grid-4{grid-template-columns:1fr 1fr !important; gap:10px !important;}
      .stat-grid-3{grid-template-columns:1fr !important; gap:10px !important;}
      .two-col{grid-template-columns:1fr !important; gap:24px !important;}

      /* Iceberg : 4 colonnes → 2x2 */
      .iceberg-grid{grid-template-columns:1fr 1fr !important; gap:20px !important;}
      .iceberg-grid > div{
        border-right:none !important;
        border-bottom:1px solid rgba(255,255,255,0.15);
        padding:16px 0 !important;
      }
      .iceberg-grid > div:last-child{border-bottom:none;}
      .iceberg-title{font-size:22px !important;}

      /* Externalisation : 4 colonnes → 2x2 */
      .ext-grid{grid-template-columns:1fr 1fr !important; gap:20px !important;}
      .ext-grid > div{
        border-right:none !important;
        border-bottom:1px solid rgba(255,255,255,0.15);
        padding:16px 0 !important;
      }
      .ext-grid > div:last-child{border-bottom:none;}
      .ext-title{font-size:24px !important;}
      .ext-value{font-size:30px !important;}

      /* Sections sombres : padding réduit */
      .dark-section, .gradient-section{padding:28px 22px !important;}
      .dark-section h3{font-size:22px !important;}

      /* Cards de recommandations : passe en flex column */
      .reco-card{grid-template-columns:1fr !important; gap:14px !important; padding:20px !important;}
      .reco-card-impact{border-left:none !important; border-top:1px solid #CDD9E3; padding-left:0 !important; padding-top:14px !important;}

      /* Rapport de direction */
      .exec-report{padding:28px 22px !important;}
      .exec-report-title{font-size:22px !important;}

      /* CTA Calendly */
      .cta-calendly{padding:36px 24px !important;}
      .cta-calendly h3{font-size:26px !important;}

      /* Lead capture form */
      .lead-form-grid{grid-template-columns:1fr !important;}

      /* Boutons de navigation : plus petits */
      .nav-btn{padding:12px 18px !important; font-size:12px !important;}

      /* Footer */
      .site-footer{flex-direction:column; align-items:flex-start !important;}

      /* Titres résultats */
      .result-title{font-size:32px !important;}
    }

    /* ─── PRINT ─────────────────────────────────────────────────── */
    @page{
      size:A4;
      margin:14mm 12mm 16mm 12mm;
    }

    @media print{
      *,*::before,*::after{
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
        color-adjust:exact !important;
      }

      html,body{
        background:white !important;
        font-size:10pt;
      }

      /* Cacher tout ce qui est interactif ou non pertinent en PDF */
      .no-print,
      button:not(.calendly-btn),
      header.app-header{
        display:none !important;
      }
      .bg-logo{display:none !important;}

      /* Layout adapté au format A4 */
      .page-wrap{padding:0 !important; max-width:100% !important;}
      .hero-grid{grid-template-columns:1.6fr 1fr !important; gap:20px !important;}
      .stat-grid-4{grid-template-columns:repeat(4,1fr) !important; gap:8px !important;}
      .stat-grid-3{grid-template-columns:repeat(3,1fr) !important; gap:8px !important;}
      .iceberg-grid{grid-template-columns:repeat(4,1fr) !important;}
      .ext-grid{grid-template-columns:repeat(4,1fr) !important;}
      .two-col{grid-template-columns:1fr 1fr !important; gap:18px !important;}

      /* Tailles de typographie compactées pour A4 */
      .result-title{font-size:32pt !important;}
      .score-big{font-size:64pt !important;}
      .dark-section, .gradient-section{
        padding:24px 26px !important;
      }
      .dark-section h3, .gradient-section h3,
      .iceberg-title, .ext-title{font-size:18pt !important;}

      /* Éviter les coupures uniquement sur les éléments compacts */
      .reco-card,
      .stat-grid-4 > *,
      .stat-grid-3 > *,
      .iceberg-grid > *,
      .ext-grid > *{
        page-break-inside:avoid;
        break-inside:avoid;
      }

      h1, h2, h3, h4{
        page-break-after:avoid;
        break-after:avoid;
      }

      /* Footer position:fixed — fonctionne en mode standalone (nouvel onglet) */
      .print-footer{
        display:flex !important;
        position:fixed;
        bottom:0;
        left:12mm;
        right:12mm;
        height:10mm;
        align-items:center;
        justify-content:space-between;
        font-family:"Wix Madefor Text",sans-serif;
        font-size:8pt;
        color:#5F7388;
        padding-top:3mm;
        border-top:1px solid #CDD9E3;
        background:white;
      }
      .print-footer img{height:16px; width:auto;}
      .print-footer-brand{display:flex; align-items:center; gap:8px; font-weight:600;}
      .print-footer a{
        color:#2D7A8B !important;
        font-weight:600;
        text-decoration:none;
      }

      /* Footer INLINE en fin de document — garantit la présence du logo en backup */
      .print-footer-inline{
        display:flex !important;
        justify-content:space-between;
        align-items:center;
        margin-top:32px;
        padding:14px 0;
        border-top:1px solid #CDD9E3;
        font-family:"Wix Madefor Text",sans-serif;
        font-size:9pt;
        color:#5F7388;
        page-break-before:avoid;
        break-before:avoid;
      }
      .print-footer-inline img{height:20px; width:auto;}
      .print-footer-inline-brand{display:flex; align-items:center; gap:10px; font-weight:600;}
      .print-footer-inline a{
        color:#2D7A8B !important;
        font-weight:700;
        text-decoration:underline;
      }

      /* CTA Calendly : préserver le fond sombre */
      .cta-calendly{
        background:#0A1F33 !important;
        color:#fff !important;
        page-break-inside:avoid;
      }
      .cta-calendly *{color:#fff !important;}
      .cta-calendly .calendly-btn{
        background:#A8DCEC !important;
        color:#0A1F33 !important;
        border:none !important;
        text-decoration:none !important;
      }
      .cta-calendly .calendly-btn *{color:#0A1F33 !important;}
      .cta-calendly .calendly-link{
        color:#A8DCEC !important;
        text-decoration:underline !important;
      }
    }
  </style>
</head>

    // ── PALETTE & TYPO ───────────────────────────────────────────
    const c = {
      paper:'#F4F8FB', paperDeep:'#E6EEF4', ink:'#0A1F33',
      inkSoft:'#1E3550', muted:'#5F7388', rule:'#CDD9E3',
      accent:'#2D7A8B', cyan:'#A8DCEC', amber:'#B8862E',

    };
    const fmt = n => Math.round(n).toLocaleString('fr-FR');

    // ── DONNÉES PAR DÉFAUT ───────────────────────────────────────
    const DEF = {
      ticketsMin:500, ticketsMax:1500, clients:1250, agents:3,
      frt:8, mttr:48, escalationRate:20,
      nps:15, csat:70, complaintsRate:1.5,
      techImpact:60, commercialImpact:40, repetitivePct:40,
    };

    // ── NORMALISATION : convertit les réponses simples en données complètes
    function normalize(d) {
      const agents = d.agents || 3;
      // Tickets = moyenne entre min et max ; on garde aussi min/max pour le rapport
      const ticketsMin = d.ticketsMin ?? 500;
      const ticketsMax = d.ticketsMax ?? 1500;
      const tickets = Math.round((ticketsMin + ticketsMax) / 2);
      const clients = d.clients || 1000;
      // Réclamations : maintenant en % des clients, on convertit en nombre absolu
      const complaintsRate = d.complaintsRate ?? 1.5;
      const complaints = Math.max(1, Math.round((complaintsRate / 100) * clients));
      // Heures cachées dérivées du % d'impact et de la base de tickets
      const techHours = d.techImpact || 30;
      const commercialHours = d.commercialImpact || 25;
      const repetitiveHours = Math.round((d.repetitivePct||30)/100 * tickets * 0.3);
      return {
        tickets, ticketsMin, ticketsMax,
        clients, agents, hoursPerAgent:152,
        frt:d.frt||8, mttr:d.mttr||48, fcr:55, globalResolution:85,
        exchangesPerTicket:4, escalationRate:d.escalationRate||20,
        nps:d.nps??15, csat:d.csat??70,
        complaints, complaintsRate,
        negativeReviews:Math.round(complaints*0.4),
        techHours, commercialHours, repetitiveHours,
        // Financier auto-calculé (moyennes B2B hospitality France)
        agentCost:3500,
        toolsCost:Math.max(200, agents*80),
        managersCost:agents>3?Math.ceil(agents/5)*2000:agents>=2?800:0,
        cac:400, ltv:3000,
      };
    }

    // ── CALCULS ──────────────────────────────────────────────────
    function compute(raw) {
      const d = normalize(raw);
      const frtScore  = d.frt<=1?100:d.frt<=4?80:d.frt<=12?55:d.frt<=24?30:10;
      const mttrScore = d.mttr<=4?100:d.mttr<=12?85:d.mttr<=24?65:d.mttr<=72?40:20;
      const fcrScore  = Math.min(100,Math.max(0,d.fcr*1.25));
      const escScore  = Math.max(0,100-d.escalationRate*4);
      const performance=(frtScore+mttrScore+fcrScore+escScore)/4;
      const npsScore  = Math.max(0,Math.min(100,(d.nps+100)/2));
      const csatScore = Math.max(0,Math.min(100,d.csat));
      // cmpRatio = % de clients qui se plaignent (au lieu de l'ancien % par ticket)
      const cmpRatio  = d.complaintsRate ?? 0;
      const cmpScore  = Math.max(0, 100 - cmpRatio * 14);
      const satisfaction=npsScore*0.4+csatScore*0.4+cmpScore*0.2;
      const agentH    = Math.max(1,d.agents*d.hoursPerAgent);
      const hiddenH   = d.techHours+d.commercialHours+d.repetitiveHours;
      const productivity=Math.max(0,100-(hiddenH/(agentH+hiddenH))*220);
      const direct    = d.agents*d.agentCost+d.toolsCost+d.managersCost;
      const cpt       = d.tickets>0?direct/d.tickets:0;
      const costScore = cpt<=8?100:cpt<=18?80:cpt<=35?55:cpt<=60?30:15;
      const ltvCac    = d.ltv/d.cac;
      const ltvScore  = ltvCac>=5?100:ltvCac>=3?80:ltvCac>=2?60:ltvCac>=1?35:15;
      const financial = (costScore+ltvScore)/2;
      const global    = Math.round(performance*0.30+satisfaction*0.30+productivity*0.20+financial*0.20);
      let cat,catColor,catDesc;
      if(global>=81){cat='Excellence opérationnelle';catColor='#1B5C6E';catDesc='Votre support est un avantage compétitif majeur.';}
      else if(global>=61){cat='Performant';catColor=c.accent;catDesc="Une base solide avec un fort potentiel d'optimisation.";}
      else if(global>=41){cat='Correct';catColor=c.amber;catDesc='Des fondamentaux en place mais des inefficacités coûteuses.';}
      else if(global>=21){cat='Faible';catColor=c.coral;catDesc='Le support pèse sur la rentabilité et la satisfaction.';}
      else{cat='Critique';catColor='#7C1F11';catDesc='Risque élevé de perte clients et de coûts cachés majeurs.';}
      const hTech=d.techHours*65, hComm=d.commercialHours*55, hRep=d.repetitiveHours*45;
      const hEsc=(d.escalationRate/100)*d.tickets*12;
      const totalH=hTech+hComm+hRep+hEsc, totalR=direct+totalH;
      const churn=Math.max(0,Math.min(40,(100-csatScore)*0.15+(50-Math.min(50,npsScore))*0.2+cmpRatio*1.5));
      const atRisk=Math.round((churn/100)*d.clients), revAtRisk=atRisk*d.ltv;
      const wasted=(d.repetitiveHours+(d.escalationRate/100)*d.tickets*0.5)*12*45;
      const savings=direct*0.32*12+totalH*12*0.55;
      const roi=Math.round(((savings-direct*0.68*12)/Math.max(1,direct*0.68*12))*100);
      const recov=(d.techHours+d.commercialHours+d.repetitiveHours)*0.75;
      return {scores:{performance,satisfaction,productivity,financial,global},
              cat,catColor,catDesc,direct,totalH,totalR,hTech,hComm,hRep,hEsc,
              cpt,ltvCac,churn,atRisk,revAtRisk,cmpRatio,wasted,savings,roi,recov,
              newMttr:d.mttr*0.6,newFcr:Math.min(95,55*1.25),newNps:Math.min(100,d.nps+14),
              normalized:d};
    }

    function generateDiag(d,r) {
      const str=[],wk=[],rec=[];
      const n = r.normalized;

      // ── FORCES — langage clair et concret ─────────────────────
      if(r.scores.performance>=70) str.push({
        t:'Vos délais tiennent la route',
        d:`Vos clients sont pris en charge en ${n.frt}h et leurs problèmes résolus en ${n.mttr}h en moyenne — c'est dans les standards du marché.`
      });
      if(r.scores.satisfaction>=70) str.push({
        t:'Vos clients sont globalement satisfaits',
        d:`NPS de ${n.nps} (recommandation) et CSAT de ${n.csat}% (satisfaction post-contact) à des niveaux acceptables.`
      });
      if(r.ltvCac>=3) str.push({
        t:'Votre modèle économique est sain',
        d:`Chaque euro investi en acquisition rapporte ${r.ltvCac.toFixed(1)}€ sur la durée de vie du client — votre support a de la marge pour s'améliorer sans tuer la rentabilité.`
      });
      if(!str.length) str.push({
        t:"Vous avez décidé d'en avoir le cœur net",
        d:"Réaliser cet audit est déjà une décision stratégique. C'est le bon moment pour structurer une démarche d'amélioration."
      });

      // ── FAIBLESSES — langage explicite, comparaisons concrètes ─
      if(n.frt>4) wk.push({
        t:"Vos clients attendent trop longtemps une première réponse",
        d:`En moyenne ${n.frt}h avant qu'un agent leur réponde. Le standard B2B premium est sous 4h. Au-delà, le client a le temps de chercher ailleurs ou de s'énerver.`,
        s:n.frt>16?'high':'med'
      });
      if(n.mttr>24) wk.push({
        t:"Résoudre un problème prend trop de temps",
        d:`${n.mttr}h en moyenne entre le premier contact et la clôture définitive. Plus le délai s'allonge, plus le risque de perte du client augmente.`,
        s:n.mttr>72?'high':'med'
      });
      if(n.escalationRate>15) wk.push({
        t:"Trop de demandes remontent aux équipes techniques",
        d:`${n.escalationRate}% des tickets nécessitent l'intervention d'experts (dev, IT...). Cela surcharge des équipes qui devraient être focalisées sur le produit.`,
        s:n.escalationRate>25?'high':'med'
      });
      if(n.nps<30) wk.push({
        t:"Vos clients ne vous recommanderaient pas",
        d:`NPS de ${n.nps} (sur une échelle de -100 à +100). En dessous de 30, vos clients sont neutres ou critiques — bouche-à-oreille à risque.`,
        s:n.nps<10?'high':'med'
      });
      if(n.csat<70) wk.push({
        t:"La satisfaction post-contact est insuffisante",
        d:`CSAT de ${n.csat}% — moins de 70% de vos clients se déclarent satisfaits après contact avec le support. Le standard B2B est de 75% minimum.`,
        s:n.csat<60?'high':'med'
      });
      if(n.complaintsRate>1.5) wk.push({
        t:"Trop de clients vous expriment formellement un mécontentement",
        d:`${n.complaintsRate.toFixed(1)}% de vos clients (${fmt(n.complaints)} sur ${fmt(n.clients)}) se plaignent chaque mois. Au-delà de 1,5%, c'est un signal d'alerte fort.`,
        s:n.complaintsRate>3?'high':'med'
      });
      if(r.totalH>r.direct*0.4) wk.push({
        t:"Votre support coûte bien plus cher que vous ne le pensez",
        d:`${fmt(r.totalH)}€ par mois sont absorbés par vos équipes techniques et commerciales pour faire du support déguisé — au lieu de leur cœur de métier.`,
        s:'high'
      });
      if(r.churn>12) wk.push({
        t:"Vous risquez de perdre des clients à cause du support",
        d:`Environ ${r.atRisk} clients (${r.churn.toFixed(1)}% de votre base) sont en zone de churn — soit ${fmt(r.revAtRisk)}€ de revenus récurrents exposés sur 12 mois.`,
        s:r.churn>20?'high':'med'
      });

      // ── RECOMMANDATIONS — formulées comme des actions claires ─
      if(n.frt>4) rec.push({
        p:1,
        t:'Mettre en place un système de priorisation des demandes',
        i:'Délai de réponse divisé par 2 à 3',
        d:"Trier dès la réception : urgent vs courant, client stratégique vs lambda. Garantir des SLA différenciés (engagements de délai contractuels)."
      });
      if(r.totalH>r.direct*0.3) rec.push({
        p:1,
        t:'Cloisonner le support du reste de votre organisation',
        i:`${fmt(r.totalH*0.7)}€/mois récupérés pour les autres équipes`,
        d:"Mettre en place un filtre L1 (première ligne) strict avec procédure d'escalade documentée. Vos techniques et commerciaux n'auraient plus à faire du SAV."
      });
      if(n.repetitiveHours>40) rec.push({
        p:2,
        t:'Automatiser les demandes qui reviennent en boucle',
        i:`${Math.round(n.repetitiveHours*0.6)}h/mois libérées`,
        d:"Self-service (centre d'aide), chatbot pour les FAQ, statut de commande en temps réel, mots de passe en autonomie..."
      });
      if(r.churn>12) rec.push({
        p:1,
        t:'Lancer un programme de rétention proactive',
        i:`${Math.round(r.atRisk*0.5)} clients potentiellement sauvegardés`,
        d:'Identifier les comptes à risque via les signaux faibles (silence, baisse usage, plaintes...) et déclencher un contact commercial avant la rupture.'
      });
      if(r.scores.global<60) rec.push({
        p:1,
        t:"Évaluer l'externalisation à un partenaire spécialisé",
        i:`${fmt(r.savings)}€/an d'économies estimées`,
        d:'Un prestataire mature apporte process éprouvés, équipes déjà formées et scalabilité immédiate. ROI souvent inférieur à 12 mois.'
      });
      if(n.nps<30 || n.csat<70) rec.push({
        p:2,
        t:"Mettre en place une boucle de feedback systématique",
        i:'Gain estimé de +8 à +15 pts NPS',
        d:"Envoyer un CSAT après chaque clôture de ticket, analyser chaque semaine les verbatim négatifs, agir sur les irritants récurrents."
      });
      if(n.complaintsRate>2) rec.push({
        p:1,
        t:"Diagnostiquer la racine des plaintes",
        i:'Réduction de 40 à 60% des plaintes',
        d:"Catégoriser les motifs de mécontentement les plus fréquents et traiter les 3 causes majeures à la source — pas en surface."
      });
      rec.sort((a,b)=>a.p-b.p);
      return {str,wk,rec};
    }

           label:'Quelle part de vos demandes sont des questions répétitives ?',
           hint:"Demandes simples qui reviennent en boucle : mots de passe, statuts de commande, FAQ de base, « comment faire X »… Typiquement automatisables.",

             {l:'40 à 60%', v:50},
             {l:'Plus de 60%', v:75},

      },
    ];

    // ── PAGE WRAPPER ─────────────────────────────────────────────
    const W = ({stage, step, totalSteps, children}) => (
      <div style={{minHeight:'100vh', background:c.paper, fontFamily:F.s, color:c.ink, paddingBottom:80}}>

    );

    // ── FORMULAIRE ÉTAPE — RENDU GÉNÉRIQUE PAR TYPE ──────────────
    const FormField = ({field, value, onChange}) => (
      <div style={{marginBottom:40}}>
        <div style={{fontFamily:F.d, fontSize:19, fontWeight:700, color:c.ink, marginBottom: field.hint ? 4 : 18, lineHeight:1.3, letterSpacing:'-0.01em'}}>

    // ── COMPOSANT PDFReport : TEMPLATE A4 OPTIMISÉ POUR GÉNÉRATION PDF ─
    // Rendu hors-écran (left: -99999px), html2pdf le capture puis le convertit.
    // Largeur fixe = 190mm (= A4 portrait moins marges 10mm). Chaque section
    // est dimensionnée pour tenir proprement sur une page A4 (245mm utiles).
    function PDFReport({data, lead, res, diag, rdr, costD}) {
      const today = new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'});

            {title}
          </div>

        <div style={{padding:'14px 14px', background:c.cream, border:`1px solid ${c.rule}`, borderRadius:6, position:'relative', overflow:'hidden'}}>
          <div style={{position:'absolute', top:0, left:0, width:3, height:'100%', background:accent||c.rule}}/>
          <div style={{fontSize:7, fontWeight:700, letterSpacing:'0.14em', color:c.muted, textTransform:'uppercase', marginBottom:8}}>{label}</div>
          <div style={{fontSize:20, fontWeight:800, fontFamily:F.d, color:valueColor||c.ink, lineHeight:1, letterSpacing:'-0.02em'}}>{value}</div>
          {sub && <div style={{fontSize:8.5, color:c.muted, marginTop:5, lineHeight:1.35}}>{sub}</div>}
        </div>
      );

      return (
        <div style={{
          fontFamily: F.s, color: c.ink, background: 'white',
          width: '190mm', fontSize: 10, lineHeight: 1.4,
          padding: '0',
        }}>

          {/* ═══════════ PAGE 1 — COUVERTURE & SCORE GLOBAL ═══════════ */}
          <div style={{minHeight: '253mm', paddingBottom: '10mm'}}>
            {/* Header */}
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', paddingBottom:14, borderBottom:`1px solid ${c.rule}`, marginBottom:30}}>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <img src={IZZY_LOGO} style={{width:32, height:'auto'}}/>
                <div>
                  <div style={{fontSize:13, fontWeight:800, fontFamily:F.d, lineHeight:1}}>Izzy All</div>
                  <div style={{fontSize:7.5, color:c.muted, letterSpacing:'0.15em', fontWeight:600, textTransform:'uppercase', marginTop:3}}>Audit Support Client</div>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:8, fontWeight:700, color:c.accent, letterSpacing:'0.18em', textTransform:'uppercase'}}>Rapport confidentiel</div>
                <div style={{fontSize:9, color:c.muted, marginTop:3}}>{today}</div>
              </div>
            </div>

            {/* Préparé pour */}
            <div style={{fontSize:9, fontWeight:700, color:c.accent, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8}}>
              Audit préparé pour
            </div>
            <div style={{fontSize:26, fontWeight:800, fontFamily:F.d, letterSpacing:'-0.025em', lineHeight:1.05, marginBottom:36}}>
              {company}
            </div>

            {/* Indice de maturité */}
            <div style={{fontSize:9, fontWeight:700, color:c.muted, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8}}>
              Indice de maturité
            </div>
            <div style={{fontSize:44, fontWeight:800, fontFamily:F.d, fontStyle:'italic', color:res.catColor, letterSpacing:'-0.025em', lineHeight:1, marginBottom:14}}>
              {res.cat}
            </div>
            <div style={{fontSize:12, color:c.inkSoft, lineHeight:1.55, maxWidth:'140mm', marginBottom:30}}>
              {res.catDesc}
            </div>

            {/* Score block */}
            <div style={{background:c.cream, border:`1px solid ${c.rule}`, borderRadius:8, padding:'22px 24px', marginBottom:22, display:'flex', alignItems:'center', gap:26}}>
              <div>
                <div style={{fontSize:7.5, fontWeight:700, color:c.muted, letterSpacing:'0.18em', textTransform:'uppercase'}}>Score global</div>
                <div style={{display:'flex', alignItems:'baseline', gap:4, marginTop:8}}>
                  <div style={{fontSize:62, fontWeight:800, fontFamily:F.d, lineHeight:0.9, letterSpacing:'-0.035em', color:c.ink}}>{res.scores.global}</div>
                  <div style={{fontSize:20, color:c.muted, fontStyle:'italic'}}>/100</div>
                </div>

                  <span>Critique</span><span>Faible</span><span>Correct</span><span>Performant</span><span>Excellence</span>
                </div>
                <div style={{marginTop:14, fontSize:10, lineHeight:1.5, color:c.inkSoft}}>
                  L'audit révèle <strong>{fmt(res.totalH)}€</strong> de coûts cachés mensuels et un potentiel
                  de <strong style={{color:c.accent}}>{fmt(res.savings)}€</strong> d'économies annuelles.
                </div>
              </div>
            </div>

            {/* 4 KPIs */}
            <div style={{fontSize:9, fontWeight:700, color:c.muted, letterSpacing:'0.18em', textTransform:'uppercase', marginBottom:10}}>
              Synthèse exécutive

                </div>
                <div style={{marginTop:6}}>
                  {rdr.map(r => (
                    <div key={r.dim} style={{display:'flex', justifyContent:'space-between', padding:'5px 0', borderTop:`1px solid ${c.rule}`, fontSize:9}}>
                      <span style={{color:c.inkSoft}}>{r.dim}</span>
                      <span style={{fontWeight:700, color:r.score>=r.bench?c.accent:c.coral}}>
                        {r.score} {r.score>=r.bench?'↑':'↓'} {r.bench}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Pie */}
              <div style={{padding:'14px 14px', background:c.cream, border:`1px solid ${c.rule}`, borderRadius:8}}>
                <div style={{fontSize:11, fontWeight:700, fontFamily:F.d, marginBottom:4}}>Décomposition du coût réel</div>
                <div style={{fontSize:8.5, color:c.muted, marginBottom:6}}>Coûts directs + coûts cachés</div>
                <div style={{height:180, display:'flex', justifyContent:'center'}}>
                  <PieChart width={250} height={180}>
                    <Pie data={costD.map(d=>({...d, name:d.n, value:d.v}))} cx="50%" cy="50%" innerRadius={42} outerRadius={75} paddingAngle={2} dataKey="value">

                <div style={{marginTop:6}}>
                  {costD.map(d => (
                    <div key={d.n} style={{display:'flex', alignItems:'center', gap:6, fontSize:9, padding:'3px 0'}}>
                      <span style={{width:9, height:9, background:d.col, borderRadius:2, flexShrink:0}}/>
                      <span style={{flex:1, color:c.inkSoft}}>{d.n}</span>
                      <span style={{fontWeight:600, color:c.muted, fontVariantNumeric:'tabular-nums'}}>{Math.round(d.v/res.totalR*100)}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* L'ICEBERG - même page */}
            <div style={{marginTop:24}}>
              <SectionHead num="03" title="L'iceberg du support"/>
              <div style={{background:c.ink, color:'#fff', padding:'24px 24px', borderRadius:10}}>
                <div style={{fontSize:8, fontWeight:700, letterSpacing:'0.2em', color:c.cyan, textTransform:'uppercase'}}>Pour chaque euro visible</div>
                <div style={{fontSize:20, fontWeight:700, fontFamily:F.d, marginTop:6, letterSpacing:'-0.02em', lineHeight:1.2}}>
                  <span style={{fontStyle:'italic', color:c.cyan}}>{(res.totalH/Math.max(1,res.direct)).toFixed(2)}€</span> sont absorbés par d'autres équipes.
                </div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginTop:22}}>
                  {[
                    {l:'Tech', v:res.hTech, d:`${res.normalized.techHours}h × 65€`},
                    {l:'Commercial', v:res.hComm, d:`${res.normalized.commercialHours}h × 55€`},
                    {l:'Répétitif', v:res.hRep, d:`${res.normalized.repetitiveHours}h × 45€`},

                    <div key={i}>

                      <div style={{fontSize:18, fontWeight:800, fontFamily:F.d, marginTop:5, letterSpacing:'-0.02em', color:'#fff'}}>{fmt(s.v)}€</div>
                      <div style={{fontSize:8, color:c.cyan, marginTop:3, fontWeight:500}}>{s.d}</div>
                    </div>
                  ))}

                <div style={{marginTop:22, paddingTop:14, borderTop:'1px solid rgba(255,255,255,0.18)'}}>

                  <div style={{display:'flex', alignItems:'baseline', gap:14, marginTop:4}}>
                    <div style={{fontSize:32, fontWeight:800, fontFamily:F.d, color:c.cyan, letterSpacing:'-0.03em'}}>{fmt(res.wasted)}€</div>

                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* ═══════════ PAGE 3 — IMPACT CLIENT & DIAGNOSTIC ═══════════ */}
          <div className="pdf-page-break" style={{pageBreakBefore:'always', minHeight:'253mm', paddingTop:6, paddingBottom:'10mm'}}>

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:12}}>

              <PdfCard label="CSAT" value={`${res.normalized.csat}%`} sub={`${res.normalized.csat<75?'En dessous':'Au-dessus'} médiane B2B (75%)`} accent={res.normalized.csat<75?c.amber:c.accent}/>
              <PdfCard label="Ratio réclamations" value={`${res.cmpRatio.toFixed(1)}%`} sub={`${fmt(res.normalized.complaints)} clients sur ${fmt(res.normalized.clients)} mécontents`} accent={res.cmpRatio>2?c.coral:c.accent}/>

    // ── GÉNÉRATION PDF VRAIE (jsPDF + html2canvas) ───────────────
    // Génère un vrai PDF programmatiquement, avec liens cliquables natifs,
    // logo footer sur chaque page, et capture des graphiques en image.
    // Pas de dépendance au navigateur ou au wrapper Wix.
    function hexToRgb(hex) {
      const m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
      return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [0,0,0];
    }

    async function captureNode(selector) {
      const el = document.querySelector(selector);
      if (!el || !window.html2canvas) return null;
      try {
        const canvas = await window.html2canvas(el, {
          scale: 3,
          backgroundColor: '#FFFFFF',
          logging: false,
          useCORS: true,
          letterRendering: true,
          allowTaint: false,
        });
        return canvas.toDataURL('image/png');
      } catch(e) {
        console.error('Capture failed:', e);
        return null;
      }
    }

    async function generatePDF({data, lead, results, diag, logoBase64}) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4', compress:true});
      const normalized = results.normalized;

      // ── SANITIZATION DES CARACTÈRES UNICODE ─────────────────────
      // La Helvetica intégrée à jsPDF ne supporte pas certains caractères :
      // - U+202F narrow no-break space (produit par toLocaleString) → rendu comme "/"
      // - U+2192 → flèche droite → rendu comme "!' " ou caractère bizarre
      // - U+2013/2014 en/em dash → mal rendus dans certaines versions
      // On intercepte toutes les fonctions text/textWithLink/splitTextToSize pour
      // assainir les entrées avant rendu.
      const sanitize = s => typeof s !== 'string' ? s : s
        .replace(/[\u202F\u00A0]/g, ' ')   // espaces insécables → espace normal
        .replace(/\u2192/g, '->')           // → → ->
        .replace(/\u2014/g, '—')            // em dash : on garde, supporté en Latin-1
        .replace(/\u2013/g, '-');           // en dash → tiret simple
      const cleanArg = x => {
        if (typeof x === 'string') return sanitize(x);
        if (Array.isArray(x)) return x.map(v => typeof v === 'string' ? sanitize(v) : v);
        return x;
      };
      const _origText = pdf.text.bind(pdf);
      pdf.text = function(s, ...a) { return _origText(cleanArg(s), ...a); };
      const _origSplit = pdf.splitTextToSize.bind(pdf);
      pdf.splitTextToSize = function(s, w, o) { return _origSplit(cleanArg(s), w, o); };
      const _origLink = pdf.textWithLink.bind(pdf);
      pdf.textWithLink = function(s, ...a) { return _origLink(cleanArg(s), ...a); };

      // Géométrie
      const W = 210, H = 297, M = 14;
      const CW = W - 2*M;
      const CONTENT_BOTTOM = H - 18; // 18mm réservé pour le footer

      // Couleurs (RGB)
      const C = {
        ink:[10,31,51], inkSoft:[30,53,80], muted:[95,115,136],
        rule:[205,217,227], accent:[45,122,139], cyan:[168,220,236],
        amber:[184,134,46], coral:[184,91,74], cream:[255,255,255],
        paper:[244,248,251], navy:[10,31,51], navyDeep:[6,24,42],
      };
      const catColor = hexToRgb(results.catColor);
      // Formatage numérique manuel — espace ordinaire garanti, jamais U+202F
      const fmt = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
      // Idem pour les entiers déjà sous forme de nombre
      const fmtInt = n => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');

      let pageNum = 1;

      // Helpers
      const setColor = rgb => pdf.setTextColor(rgb[0],rgb[1],rgb[2]);
      const setFill = rgb => pdf.setFillColor(rgb[0],rgb[1],rgb[2]);
      const setDraw = rgb => pdf.setDrawColor(rgb[0],rgb[1],rgb[2]);
      const setF = (size, weight='normal') => { pdf.setFont('helvetica', weight); pdf.setFontSize(size); };

      function drawFooter() {
        const fy = H - 12;
        setDraw(C.rule); pdf.setLineWidth(0.2);
        pdf.line(M, fy-3, W-M, fy-3);
        pdf.addImage(logoBase64, 'PNG', M, fy-1, 5, 5);
        setF(7,'bold'); setColor(C.muted);
        pdf.text('Izzy All — Audit Support Client', M+6.5, fy+2);
        setF(7); setColor(C.muted);
        pdf.text('Réservez votre échange :', W-M-65, fy+2);
        setF(7,'bold'); setColor(C.accent);
        pdf.textWithLink('calendly.com/commercial-izzysales/30min', W-M-43, fy+2, {url:'https://calendly.com/commercial-izzysales/30min'});
        setF(7); setColor(C.muted);
        pdf.text(`${pageNum}`, W-M+1, fy+5, {align:'right'});
      }

      function newPage() {
        drawFooter();
        pdf.addPage();
        pageNum++;
      }

      function ensureSpace(y, needed) {
        if (y + needed > CONTENT_BOTTOM) { newPage(); return M; }
        return y;
      }

      function drawRule(y, num, label) {
        setF(8,'bold'); setColor(C.muted);
        const t = `${num} — ${label.toUpperCase()}`;
        pdf.text(t, M, y);
        const tw = pdf.getTextWidth(t);
        setDraw(C.rule); pdf.setLineWidth(0.2);
        pdf.line(M+tw+4, y-1, W-M, y-1);
        return y + 8;
      }

      function drawStatCard(x, y, w, h, card) {
        setDraw(C.rule); setFill(C.cream); pdf.setLineWidth(0.2);
        pdf.roundedRect(x, y, w, h, 1.5, 1.5, 'FD');
        setFill(card.color);
        pdf.rect(x, y, 0.9, h, 'F');
        setF(6,'bold'); setColor(C.muted);
        pdf.text(card.label, x+4, y+6);
        setF(15,'bold'); setColor(C.ink);
        pdf.text(card.value, x+4, y+16);
        setF(7); setColor(C.muted);
        pdf.text(pdf.splitTextToSize(card.sub, w-7), x+4, y+21);
      }

      // ═══════════════ PAGE 1 ═══════════════
      // Logo + brand top
      pdf.addImage(logoBase64, 'PNG', M, M, 9, 9);
      setF(13,'bold'); setColor(C.ink);
      pdf.text('Izzy All', M+11, M+4.5);
      setF(6,'bold'); setColor(C.muted);
      pdf.text('AUDIT SUPPORT CLIENT', M+11, M+8);
      setF(7); setColor(C.muted);
      pdf.text(new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'}).toUpperCase(), W-M, M+6, {align:'right'});

      let y = M + 13;
      setDraw(C.rule); pdf.setLineWidth(0.3); pdf.line(M, y, W-M, y);
      y += 12;

      setF(8,'bold'); setColor(C.accent);
      pdf.text(`RAPPORT — ${(lead.company||'VOTRE ORGANISATION').toUpperCase()}`, M, y);
      y += 10;

      // Title bloc
      setF(26,'bold'); setColor(C.ink);
      pdf.text('Indice de maturité', M, y);
      y += 9;
      setF(26,'bolditalic'); setColor(catColor);
      pdf.text(results.cat, M, y);
      y += 12;

      // Description
      setF(10); setColor(C.inkSoft);
      const descText = `${results.catDesc} L'audit révèle ${fmt(results.totalH)}€ de coûts cachés mensuels et un potentiel de ${fmt(results.savings)}€ d'économies annuelles.`;
      const descLines = pdf.splitTextToSize(descText, CW*0.60);
      pdf.text(descLines, M, y);

      // Score box (positionné à droite, aligné avec le titre)
      const sbX = M + CW*0.62;
      const sbY = M + 25;
      const sbW = CW*0.38;
      const sbH = 48;
      setDraw(C.rule); setFill(C.cream); pdf.setLineWidth(0.3);
      pdf.roundedRect(sbX, sbY, sbW, sbH, 2, 2, 'FD');
      setF(6,'bold'); setColor(C.muted);
      pdf.text('SCORE GLOBAL', sbX+5, sbY+7);
      setF(42,'bold'); setColor(C.ink);
      pdf.text(String(results.scores.global), sbX+5, sbY+27);
      setF(13,'italic'); setColor(C.muted);
      const scoreW = pdf.getTextWidth(String(results.scores.global));
      setF(42,'bold'); const realScoreW = pdf.getTextWidth(String(results.scores.global));
      setF(13,'italic');
      pdf.text('/100', sbX+5+realScoreW+2, sbY+27);
      // Barre
      const barX = sbX+5, barY = sbY+33, barW = sbW-10;
      setFill(C.paper); pdf.rect(barX, barY, barW, 1.8, 'F');
      setFill(catColor); pdf.rect(barX, barY, barW*(results.scores.global/100), 1.8, 'F');
      setF(5.5,'bold'); setColor(C.muted);
      ['Critique','Faible','Correct','Performant','Excellence'].forEach((lbl,i) => {
        const xp = barX + (barW/4)*i;
        pdf.text(lbl, xp, barY+5, {align: i===0?'left':i===4?'right':'center'});
      });

      // Avancer y au plus bas entre la description et la score box
      y = Math.max(y + descLines.length*4, sbY + sbH) + 12;

      // 01 — Synthèse exécutive
      y = drawRule(y, '01', 'Synthèse exécutive');
      const synthCards = [
        { label:'COÛT RÉEL MENSUEL', value:`${Math.round(results.totalR/1000)}k€`, sub:`${Math.round(results.totalH/results.totalR*100)}% de coûts cachés`, color:C.coral },
        { label:'COÛT PAR TICKET', value:`${fmt(results.cpt)}€`, sub:results.cpt>25?'Au-dessus du benchmark':'Dans la norme sectorielle', color:results.cpt>25?C.coral:C.accent },
        { label:'RISQUE DE CHURN', value:`${results.churn.toFixed(1)}%`, sub:`${results.atRisk} clients exposés`, color:results.churn>15?C.coral:results.churn>7?C.amber:C.accent },
        { label:'CA EXPOSÉ', value:`${Math.round(results.revAtRisk/1000)}k€`, sub:'Revenus à risque sur 12 mois', color:C.coral },
      ];
      const synthW = (CW - 9)/4;
      synthCards.forEach((card, i) => {
        drawStatCard(M + i*(synthW+3), y, synthW, 28, card);
      });
      y += 32;

      // Disclaimer
      setFill(C.paper); pdf.roundedRect(M, y, CW, 14, 1, 1, 'F');
      setF(7); setColor(C.inkSoft);
      pdf.text(pdf.splitTextToSize("Données financières estimées à partir des moyennes du secteur B2B hospitality. Pour un audit personnalisé avec vos chiffres exacts, contactez-nous via Calendly.", CW-8), M+4, y+5);
      y += 18;

      // ═══════════════ PAGE 2 — Cartographie + Iceberg ═══════════════
      newPage(); y = M;
      y = drawRule(y, '02', 'Cartographie de la maturité');

      // Capture des graphiques recharts
      const radarImg = await captureNode('#radar-capture');

      const chartW = (CW - 5)/2;
      const chartH = 64;

      // Card radar
      setDraw(C.rule); setFill(C.cream); pdf.setLineWidth(0.2);
      pdf.roundedRect(M, y, chartW, chartH, 1.5, 1.5, 'FD');

      if (radarImg) {
        pdf.addImage(radarImg, 'PNG', M+2, y+8, chartW-4, chartH-12);

      // Card pie
      setDraw(C.rule); setFill(C.cream);
      pdf.roundedRect(M+chartW+5, y, chartW, chartH, 1.5, 1.5, 'FD');
      setF(10,'bold'); setColor(C.ink);
      pdf.text('Décomposition du coût réel', M+chartW+9, y+6);
      if (pieImg) {
        pdf.addImage(pieImg, 'PNG', M+chartW+7, y+8, chartW-4, chartH-12);
      }
      y += chartH + 8;

      // Iceberg
      y = drawRule(y, '03', 'Coûts cachés et inefficacités');
      const icebergH = 78;
      setFill(C.navy);
      pdf.roundedRect(M, y, CW, icebergH, 2, 2, 'F');
      let iy = y + 9;
      setF(7,'bold'); setColor(C.cyan);
      pdf.text("L'ICEBERG DU SUPPORT", M+7, iy);
      iy += 8;
      setF(15,'bold'); setColor(C.cream);
      const ratio = (results.totalH/Math.max(1, results.direct)).toFixed(2);
      const icebTitle = pdf.splitTextToSize(`Pour chaque euro visible, ${ratio}€ sont absorbés par d'autres équipes.`, CW-20);
      pdf.text(icebTitle, M+7, iy);
      iy += icebTitle.length*7;

      const icebItems = [
        { l:'TECH ABSORBÉ', v:results.hTech, d:`${normalized.techHours}h × 65€` },
        { l:'COMMERCIAL', v:results.hComm, d:`${normalized.commercialHours}h × 55€` },
        { l:'RÉPÉTITIF', v:results.hRep, d:`${normalized.repetitiveHours}h × 45€` },
        { l:'ESCALADES', v:results.hEsc, d:`~${Math.round(normalized.escalationRate/100*normalized.tickets)} × 12€` },
      ];
      const itW = (CW - 14)/4;
      iy += 4;
      icebItems.forEach((it, i) => {
        const ix = M + 7 + i*itW;
        setF(6,'bold'); setColor(C.cyan);
        pdf.text(it.l, ix, iy);
        setF(15,'bold'); setColor(C.cream);
        pdf.text(`${fmt(it.v)}€`, ix, iy+7);
        setF(6); setColor(C.cyan);
        pdf.text(it.d, ix, iy+11);
        if (i < 3) {
          setDraw([60,80,105]); pdf.setLineWidth(0.15);
          pdf.line(ix+itW-2, iy-3, ix+itW-2, iy+14);
        }
      });
      iy += 18;
      setDraw([60,80,105]); pdf.setLineWidth(0.15);
      pdf.line(M+7, iy-3, M+CW-7, iy-3);
      setF(6,'bold'); setColor(C.cyan);
      pdf.text('PERTE ANNUELLE DES INEFFICACITÉS', M+7, iy+2);
      setF(20,'bold'); setColor(C.cyan);
      pdf.text(`${fmt(results.wasted)}€`, M+7, iy+12);
      setF(8); setColor(C.cream);
      pdf.text(pdf.splitTextToSize('Temps brûlé sur des demandes évitables, escalades injustifiées et allers-retours inutiles — chaque année.', 95), M+70, iy+10);
      y += icebergH + 8;

      // ═══════════════ PAGE 3 — Satisfaction + Diagnostic ═══════════════
      newPage(); y = M;
      y = drawRule(y, '04', 'Impact satisfaction client');

      // Petit lexique sous la section pour les non-experts
      setF(7,'italic'); setColor(C.muted);
      const lex = pdf.splitTextToSize("NPS = à quel point vos clients vous recommanderaient. CSAT = % de clients satisfaits après contact. Mécontentement = % de clients qui se plaignent formellement chaque mois.", CW);
      pdf.text(lex, M, y);
      y += lex.length*3.5 + 3;

      const satCards = [
        { label:'NPS ACTUEL', value:String(normalized.nps), sub:normalized.nps<30?'Zone de vigilance':normalized.nps<50?'Acceptable':'Bon', color:normalized.nps<30?C.coral:C.accent },
        { label:'CSAT', value:`${normalized.csat}%`, sub:`${normalized.csat<75?'En dessous':'Au-dessus'} de la médiane B2B (75%)`, color:normalized.csat<75?C.amber:C.accent },
        { label:'MÉCONTENTEMENT FORMEL', value:`${results.cmpRatio.toFixed(1)}%`, sub:`${fmt(normalized.complaints)} clients sur ${fmt(normalized.clients)} par mois`, color:results.cmpRatio>2?C.coral:C.accent },
      ];
      const satW = (CW - 6)/3;
      satCards.forEach((card, i) => {
        drawStatCard(M + i*(satW+3), y, satW, 28, card);
      });
      y += 32;

      // CA exposé alert
      const alertH = 22;

      pdf.text(pdf.splitTextToSize(exposedText, CW-12), M+6, y+12);

      y = ensureSpace(y, 30);

      y = drawRule(y, '06', "Plan d'action priorisé");

      diag.rec.forEach((r, i) => {
        const recH = 22;
        if (y + recH > CONTENT_BOTTOM) { newPage(); y = M; }
        setDraw(C.rule); setFill(C.cream); pdf.setLineWidth(0.2);
        pdf.roundedRect(M, y, CW, recH, 1.5, 1.5, 'FD');

      ];
      execS.forEach(s => {

                    <Radar name="Benchmark" dataKey="bench" stroke={c.muted} fill={c.muted} fillOpacity={0.15} strokeDasharray="3 3"/>
                    <Radar name="Votre score" dataKey="score" stroke={c.accent} fill={c.cyan} fillOpacity={0.35} strokeWidth={2}/>
                    <Tooltip contentStyle={{fontFamily:F.s, fontSize:12}}/>
                  </RadarChart>
                </ResponsiveContainer>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px 12px', marginTop:12}}>
                {rdr.map(r => (
                  <div key={r.dim} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderTop:`1px solid ${c.rule}`}}>
                    <span style={{fontFamily:F.s, fontSize:12, color:c.inkSoft}}>{r.dim}</span>
                    <span style={{fontFamily:F.s, fontSize:12, fontWeight:700, color:r.score>=r.bench?c.accent:c.coral}}>{r.score} {r.score>=r.bench?'↑':'↓'} {r.bench}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{border:`1px solid ${c.rule}`, borderRadius:10, padding:28, background:c.cream}}>
              <div style={{fontFamily:F.d, fontSize:20, fontWeight:700, marginBottom:4}}>Décomposition du coût réel</div>
              <div id="pie-capture" style={{background:c.cream}}>
                <ResponsiveContainer width="100%" height={200}>
                  <PieChart>
                    <Pie data={costD.map(d=>({...d, name:d.n, value:d.v}))} cx="50%" cy="50%" innerRadius={50} outerRadius={85} paddingAngle={2} dataKey="value">
                      {costD.map((d,i) => <Cell key={i} fill={d.col}/>)}
                    </Pie>
                    <Tooltip formatter={v=>`${fmt(v)}€`} contentStyle={{fontFamily:F.s, fontSize:12}}/>
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px 8px', marginTop:8}}>
                {costD.map(d => (
                  <div key={d.n} style={{display:'flex', alignItems:'center', gap:8, fontFamily:F.s, fontSize:11, color:c.inkSoft}}>
                    <span style={{width:10, height:10, background:d.col, borderRadius:2, flexShrink:0}}/>
                    <span style={{flex:1}}>{d.n}</span>
                    <span style={{fontWeight:600, color:c.muted}}>{Math.round(d.v/res.totalR*100)}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <Rule label="Coûts cachés et inefficacités" num="03"/>
          <div className="dark-section keep-together" style={{background:c.ink, color:'#fff', padding:'44px 48px', borderRadius:10, position:'relative', overflow:'hidden'}}>
            <div className="bg-logo" style={{position:'absolute', top:-60, right:-30, opacity:0.05}}><img src={IZZY_LOGO} alt="" style={{width:400}}/></div>
            <div style={{position:'relative'}}>
              <div style={{fontFamily:F.s, fontSize:10, fontWeight:700, letterSpacing:'0.2em', color:c.cyan, textTransform:'uppercase'}}>L'iceberg du support</div>
              <div className="iceberg-title" style={{fontFamily:F.d, fontSize:30, fontWeight:700, marginTop:12, maxWidth:700}}>
                Pour chaque euro visible, <span style={{fontStyle:'italic', color:c.cyan}}>{(res.totalH/Math.max(1,res.direct)).toFixed(2)}€</span> sont absorbés par d'autres équipes.
              </div>
              <div className="iceberg-grid" style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:0, marginTop:36}}>
                {[
                  {l:'Tech absorbé', v:res.hTech, d:`${res.normalized.techHours}h × 65€`},
                  {l:'Commercial', v:res.hComm, d:`${res.normalized.commercialHours}h × 55€`},
                  {l:'Répétitif', v:res.hRep, d:`${res.normalized.repetitiveHours}h × 45€`},
                  {l:'Escalades', v:res.hEsc, d:`${Math.round(res.normalized.escalationRate/100*res.normalized.tickets)} esc. × 12€`},
                ].map((s,i) => (
                  <div key={i} style={{paddingRight:24, paddingLeft:i>0?24:0, borderRight:i<3?'1px solid rgba(255,255,255,0.12)':'none'}}>
                    <div style={{fontFamily:F.s, fontSize:10, fontWeight:600, opacity:0.6, letterSpacing:'0.12em', textTransform:'uppercase'}}>{s.l}</div>
                    <div style={{fontFamily:F.d, fontSize:30, fontWeight:700, marginTop:8, letterSpacing:'-0.02em'}}>{fmt(s.v)}€</div>
                    <div style={{fontFamily:F.s, fontSize:10, color:c.cyan, marginTop:4, fontWeight:500}}>{s.d}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:36, paddingTop:24, borderTop:'1px solid rgba(255,255,255,0.15)', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:16}}>
                <div>
                  <div style={{fontFamily:F.s, fontSize:10, fontWeight:600, opacity:0.6, letterSpacing:'0.15em', textTransform:'uppercase'}}>Perte annuelle des inefficacités</div>
                  <div style={{fontFamily:F.d, fontSize:52, fontWeight:700, marginTop:6, letterSpacing:'-0.03em', color:c.cyan}}>{fmt(res.wasted)}€</div>
                </div>
                <div style={{maxWidth:360, fontFamily:F.s, fontSize:14, lineHeight:1.5, opacity:0.8}}>Temps brûlé sur des demandes évitables, escalades injustifiées et allers-retours inutiles — chaque année.</div>
              </div>
            </div>
          </div>

          <Rule label="Impact satisfaction client" num="04"/>
          <div style={{fontFamily:F.s, fontSize:12, color:c.muted, marginBottom:14, fontStyle:'italic', lineHeight:1.5}}>
            NPS = à quel point vos clients vous recommanderaient (échelle -100 à +100). CSAT = % de clients satisfaits après contact. Ratio de mécontentement = % de clients qui se plaignent formellement chaque mois.
          </div>
          <div className="stat-grid-3 keep-together" style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16}}>
            <Card label="NPS actuel" value={res.normalized.nps} icon={Heart} sub={res.normalized.nps<30?'Zone de vigilance':res.normalized.nps<50?'Acceptable':'Bon'} accent={res.normalized.nps<30?c.coral:c.accent}/>
            <Card label="CSAT" value={`${res.normalized.csat}%`} icon={Activity} sub={`${res.normalized.csat<75?'En dessous':'Au-dessus'} de la médiane B2B (75%)`} accent={res.normalized.csat<75?c.amber:c.accent}/>
            <Card label="Mécontentement formel" value={`${res.cmpRatio.toFixed(1)}%`} icon={AlertCircle} sub={`${fmt(res.normalized.complaints)} clients sur ${fmt(res.normalized.clients)} se plaignent chaque mois`} accent={res.cmpRatio>2?c.coral:c.accent}/>
          </div>
          <div className="keep-together" style={{marginTop:20, padding:'28px 36px', background:c.cream, border:`1px solid ${c.rule}`, borderLeft:`4px solid ${c.coral}`, borderRadius:8}}>
            <div style={{display:'flex', alignItems:'flex-start', gap:16}}>
              <ShieldAlert size={26} color={c.coral} sw={1.5} style={{flexShrink:0, marginTop:2}}/>
              <div>
                <div style={{fontFamily:F.d, fontSize:20, fontWeight:700}}>{fmt(res.revAtRisk)}€ de chiffre d'affaires exposé</div>
                <div style={{fontFamily:F.s, fontSize:13, lineHeight:1.55, color:c.inkSoft, marginTop:8, maxWidth:700}}>
                  Environ <strong>{res.atRisk} clients</strong> ({res.churn.toFixed(1)}% de votre base) sont en zone de churn. À LTV estimée de {fmt(res.normalized.ltv)}€, c'est votre risque de revenus récurrents sur 12 mois.
                </div>
              </div>
            </div>
          </div>

          <Rule label="Diagnostic" num="05"/>
          <div className="keep-together two-col" style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:32}}>
            <div>
              <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
                <CheckCircle2 size={20} color={c.accent} sw={1.5}/>
                <div style={{fontFamily:F.d, fontSize:24, fontWeight:700}}>Forces</div>
              </div>
              {diag.str.map((s,i) => (
                <div key={i} style={{padding:'18px 0', borderTop:`1px solid ${c.rule}`}}>
                  <div style={{fontFamily:F.s, fontSize:14, fontWeight:700, marginBottom:6}}>{s.t}</div>
                  <div style={{fontFamily:F.s, fontSize:13, lineHeight:1.55, color:c.muted}}>{s.d}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
                <XCircle size={20} color={c.coral} sw={1.5}/>
                <div style={{fontFamily:F.d, fontSize:24, fontWeight:700}}>Faiblesses</div>
              </div>
              {diag.wk.map((w,i) => (
                <div key={i} style={{padding:'18px 0', borderTop:`1px solid ${c.rule}`}}>
                  <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                    <span style={{fontFamily:F.s, fontSize:9, fontWeight:700, padding:'2px 10px', borderRadius:100, background:w.s==='high'?c.coral:c.amber, color:'#fff', letterSpacing:'0.1em', textTransform:'uppercase'}}>{w.s==='high'?'Critique':'Modéré'}</span>
                    <div style={{fontFamily:F.s, fontSize:14, fontWeight:700}}>{w.t}</div>
                  </div>
                  <div style={{fontFamily:F.s, fontSize:13, lineHeight:1.55, color:c.muted}}>{w.d}</div>
                </div>
              ))}
            </div>
          </div>

          <Rule label="Plan d'action priorisé" num="06"/>
          <div style={{display:'grid', gap:12}}>
            {diag.rec.map((r,i) => (
              <div key={i} className="keep-together reco-card" style={{display:'grid', gridTemplateColumns:'56px 1fr 200px', gap:20, padding:'22px 24px', background:c.cream, border:`1px solid ${c.rule}`, borderRadius:8, alignItems:'center'}}>
                <div style={{fontFamily:F.d, fontSize:40, fontWeight:800, color:r.p===1?c.coral:r.p===2?c.amber:c.accent, lineHeight:1, letterSpacing:'-0.03em'}}>{String(i+1).padStart(2,'0')}</div>
                <div>
                  <span style={{fontFamily:F.s, fontSize:9, fontWeight:700, padding:'2px 10px', borderRadius:100, background:r.p===1?c.coral:r.p===2?c.amber:c.accent, color:'#fff', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:8, display:'inline-block'}}>Priorité {r.p}</span>
                  <div style={{fontFamily:F.d, fontSize:17, fontWeight:700, marginBottom:6}}>{r.t}</div>
                  <div style={{fontFamily:F.s, fontSize:12, lineHeight:1.55, color:c.muted}}>{r.d}</div>
                </div>
                <div className="reco-card-impact" style={{borderLeft:`1px solid ${c.rule}`, paddingLeft:20}}>
                  <div style={{fontFamily:F.s, fontSize:9, fontWeight:700, color:c.muted, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:6}}>Impact estimé</div>
                  <div style={{fontFamily:F.d, fontSize:16, fontWeight:700, color:c.accent, lineHeight:1.3}}>{r.i}</div>
                </div>
              </div>
            ))}
          </div>

          <Rule label="Simulation d'externalisation" num="07"/>
          <div className="gradient-section keep-together" style={{background:`linear-gradient(135deg, ${c.ink} 0%, ${c.navy} 100%)`, color:'#fff', padding:'52px', borderRadius:10, position:'relative', overflow:'hidden'}}>
            <div className="bg-logo" style={{position:'absolute', bottom:-60, right:-40, opacity:0.06}}><img src={IZZY_LOGO} alt="" style={{width:380}}/></div>
            <div style={{position:'relative'}}>
              <div style={{fontFamily:F.s, fontSize:10, fontWeight:700, letterSpacing:'0.2em', opacity:0.8, textTransform:'uppercase'}}>Et si votre support était externalisé ?</div>
              <h3 style={{fontFamily:F.d, fontSize:36, fontWeight:800, margin:'12px 0 18px', letterSpacing:'-0.02em', lineHeight:1.1}}>Le potentiel d'un partenaire spécialisé, <span style={{fontStyle:'italic', color:c.cyan}}>chiffré sur vos données.</span></h3>
              <div className="ext-grid" style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:0, marginTop:40}}>
                {[
                  {l:'Économies annuelles', v:`${Math.round(res.savings/1000)}k€`, d:'Direct + coûts cachés'},
                  {l:'Temps récupéré', v:`${Math.round(res.recov)}h/mois`, d:'Pour le cœur de métier'},
                  {l:'ROI estimé', v:`${res.roi}%`, d:'Sur 12 mois'},
                  {l:'NPS projeté', v:`+14 pts`, d:`${res.normalized.nps} → ${res.newNps}`},
                ].map((s,i) => (
                  <div key={i} style={{paddingRight:24, paddingLeft:i>0?24:0, borderRight:i<3?'1px solid rgba(255,255,255,0.12)':'none'}}>
                    <div style={{fontFamily:F.s, fontSize:10, fontWeight:600, opacity:0.7, letterSpacing:'0.12em', textTransform:'uppercase'}}>{s.l}</div>
                    <div style={{fontFamily:F.d, fontSize:40, fontWeight:800, marginTop:10, letterSpacing:'-0.025em', lineHeight:1}}>{s.v}</div>
                    <div style={{fontFamily:F.s, fontSize:11, marginTop:6, opacity:0.75}}>{s.d}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <Rule label="Rapport de direction" num="08"/>
          <div className="keep-together exec-report" style={{background:c.cream, border:`1px solid ${c.rule}`, borderRadius:10, padding:'44px 48px'}}>
            <div style={{fontFamily:F.s, fontSize:10, fontWeight:700, color:c.muted, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8}}>Note confidentielle · Direction Générale</div>
            <div className="exec-report-title" style={{fontFamily:F.d, fontSize:28, fontWeight:700, letterSpacing:'-0.02em', marginBottom:32}}>Synthèse stratégique — {lead.company||'Votre organisation'}</div>
            {[
              {title:'Situation actuelle', text:`L'évaluation positionne votre support dans la catégorie « ${res.cat} » avec un score de ${res.scores.global}/100. La structure traite entre ${fmt(res.normalized.ticketsMin)} et ${fmt(res.normalized.ticketsMax)} demandes mensuelles pour un coût direct estimé à ${fmt(res.direct)}€, soit ${fmt(res.cpt)}€ par ticket (benchmark sectoriel : 15-25€).`},
              {title:'Risques identifiés', text:`(1) Les coûts cachés représentent ${fmt(res.totalH)}€/mois — ${Math.round(res.totalH/res.totalR*100)}% du coût total réel. (2) Le risque de churn expose ${fmt(res.revAtRisk)}€ de CA sur 12 mois. (3) ${diag.wk.filter(w=>w.s==='high').length} faiblesse(s) critique(s) requièrent une action immédiate.`},
              {title:'Opportunités', text:`Potentiel de ${fmt(res.savings)}€/an mobilisable sur 6-12 mois : automatisation (${Math.round(res.normalized.repetitiveHours*0.6)}h/mois), refonte L1/L2, récupération de ${Math.round(res.recov)}h/mois pour les équipes tech & commerciales.`},
              {title:'Recommandation stratégique', text:res.scores.global<50?"Le niveau actuel justifie une action structurante immédiate. Nous recommandons d'évaluer en priorité un partenariat d'externalisation spécialisé hospitality. Le ROI est inférieur à 12 mois.":res.scores.global<75?"Des marges d'optimisation significatives n'imposent pas de rupture organisationnelle. Plan en deux temps : optimisation interne 6 mois, puis benchmark externalisation pour arbitrer.":"La maturité opérationnelle est élevée. Investissement ciblé sur les outils prédictifs et la formation pour transformer le support en avantage concurrentiel durable."},
            ].map((s,i) => (
              <div key={i} style={{marginBottom:28}}>
                <div style={{fontFamily:F.s, fontSize:10, fontWeight:700, color:c.accent, letterSpacing:'0.18em', textTransform:'uppercase', marginBottom:8}}>{s.title}</div>
                <div style={{fontFamily:F.s, fontSize:14, lineHeight:1.7, color:c.inkSoft}}>{s.text}</div>
              </div>
            ))}
            <div style={{padding:'20px 24px', background:c.paper, borderLeft:`3px solid ${c.accent}`, borderRadius:4}}>
              <div style={{fontFamily:F.s, fontSize:9, fontWeight:700, color:c.accent, letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:6}}>Prochaine étape recommandée</div>
              <div style={{fontFamily:F.d, fontSize:16, fontWeight:700}}>Atelier de cadrage de 2h pour challenger ces conclusions et arbitrer les priorités avec votre équipe dirigeante.</div>
            </div>
          </div>

          <div className="cta-calendly keep-together" style={{marginTop:56, padding:'52px', background:c.ink, color:'#fff', borderRadius:10, textAlign:'center'}}>
            <div style={{fontFamily:F.s, fontSize:10, fontWeight:700, letterSpacing:'0.25em', opacity:0.6, textTransform:'uppercase'}}>Prochaine étape</div>
            <h3 style={{fontFamily:F.d, fontSize:36, fontWeight:800, margin:'14px 0 20px', letterSpacing:'-0.02em', lineHeight:1.1}}>
              Échangeons sur votre <span style={{fontStyle:'italic', color:c.cyan}}>plan de transformation</span>
            </h3>
            <p style={{fontFamily:F.s, fontSize:15, lineHeight:1.55, opacity:0.85, maxWidth:560, margin:'0 auto 28px'}}>
              Réservez 30 minutes avec un consultant Izzy All pour challenger ces conclusions et construire un plan d'action sur-mesure pour {lead.company||'votre organisation'}.
            </p>

            {/* Bouton principal — cliquable */}
            <a href="https://calendly.com/commercial-izzysales/30min" target="_blank" rel="noopener noreferrer"
              className="calendly-btn"
              style={{
                display:'inline-flex', alignItems:'center', gap:10,
                padding:'16px 32px',
                background:c.cyan, color:c.ink,
                border:'none', borderRadius:100,
                fontFamily:F.s, fontSize:14, fontWeight:700,
                letterSpacing:'0.06em', textTransform:'uppercase',
                textDecoration:'none',
                transition:'all 0.2s',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='#BAE4F0'}
              onMouseLeave={e=>e.currentTarget.style.background=c.cyan}
            >
              <Clock size={16}/> Réserver mon créneau (30 min)
            </a>

            {/* URL comme texte cliquable — garantit la cliquabilité du PDF */}
            <div style={{marginTop:20, fontFamily:F.s, fontSize:13, opacity:0.85}}>
              ou cliquez directement :{' '}
              <a href="https://calendly.com/commercial-izzysales/30min" target="_blank" rel="noopener noreferrer"
                className="calendly-link"
                style={{color:c.cyan, fontWeight:700, textDecoration:'underline', letterSpacing:'0.02em'}}>
                calendly.com/commercial-izzysales/30min
              </a>
            </div>

            <div className="no-print" style={{marginTop:28, paddingTop:24, borderTop:'1px solid rgba(255,255,255,0.12)'}}>
              <button onClick={doPrint} disabled={isGenerating}
                style={{background:'transparent', color:'#fff', border:`1px solid rgba(255,255,255,0.25)`, borderRadius:100, padding:'10px 20px', fontFamily:F.s, fontSize:12, fontWeight:500, cursor:isGenerating?'wait':'pointer', display:'inline-flex', alignItems:'center', gap:8, opacity:isGenerating?0.6:1}}>
                <Download size={14}/> {isGenerating ? 'Génération en cours…' : 'Télécharger le PDF complet'}
              </button>
              <div style={{marginTop:10, fontFamily:F.s, fontSize:11, opacity:0.55, lineHeight:1.5}}>
                PDF professionnel ~6 pages, avec logo en bas de page et lien Calendly cliquable.
              </div>
            </div>
          </div>

          {/* Footer INLINE à la fin du document — visible uniquement en PDF, garantit la présence du logo même quand l'audit est imprimé via l'iframe Wix */}
          <div className="print-footer-inline">
            <div className="print-footer-inline-brand">
              <img src={IZZY_LOGO} alt="Izzy All"/>
              <span>Izzy All — Audit Support Client</span>
            </div>
            <div>
              Pour échanger :{' '}
              <a href="https://calendly.com/commercial-izzysales/30min">
                calendly.com/commercial-izzysales/30min
              </a>
            </div>
          </div>

          {/* Footer répété sur chaque page imprimée (position:fixed — fonctionne en mode standalone) */}
          <div className="print-footer">
            <div className="print-footer-brand">
              <img src={IZZY_LOGO} alt="Izzy All"/>
              <span>Izzy All — Audit Support Client</span>
            </div>
            <div>
              Réservez votre échange :{' '}
              <a href="https://calendly.com/commercial-izzysales/30min">
                calendly.com/commercial-izzysales/30min
              </a>
            </div>
          </div>
        </section>
      </W>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
