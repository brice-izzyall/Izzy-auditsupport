<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;}
body{background:#1B2838;color:#C8D8E6;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.print-footer{display:none;}.print-footer-inline{display:none;}

body.pdf-capturing .no-print{display:none!important;}
body.pdf-capturing #pdf-page-1,body.pdf-capturing #pdf-page-2{padding:24px!important;background:#FFFFFF!important;color:#1a1a1a!important;}
body.pdf-capturing #pdf-page-1 h2,body.pdf-capturing #pdf-page-1 h3,body.pdf-capturing #pdf-page-1 h4,
body.pdf-capturing #pdf-page-2 h2,body.pdf-capturing #pdf-page-2 h3,body.pdf-capturing #pdf-page-2 h4{color:#0A1F33!important;}
body.pdf-capturing .cta-calendly{background:#0A1F33!important;color:#fff!important;}
body.pdf-capturing .cta-calendly *{color:#fff!important;}
body.pdf-capturing .cta-calendly .calendly-btn{background:#A8DCEC!important;color:#0A1F33!important;}
body.pdf-capturing .cta-calendly .calendly-btn *{color:#0A1F33!important;}
body.pdf-capturing .cta-calendly .calendly-link{color:#A8DCEC!important;}

@media(max-width:768px){
  .page-wrap{padding:0 16px!important;}
  .hero-title{font-size:32px!important;line-height:1.1!important;}
  .features-grid,.stat-grid,.shock-grid,.score-section,.two-col{grid-template-columns:1fr!important;}
  .lead-form-grid{grid-template-columns:1fr!important;}
}

@page{size:A4;margin:14mm 12mm 16mm 12mm;}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  html,body{background:#fff!important;color:#1a1a1a!important;font-size:10pt;}
  .no-print,header{display:none!important;}
  .page-wrap{padding:0!important;max-width:100%!important;}
  h1,h2,h3,h4{page-break-after:avoid;break-after:avoid;}
  .keep-together{page-break-inside:avoid;break-inside:avoid;}
  .cta-calendly{background:#0A1F33!important;color:#fff!important;page-break-inside:avoid;}
  .cta-calendly *{color:#fff!important;}
  .cta-calendly .calendly-btn{background:#A8DCEC!important;color:#0A1F33!important;}
  .cta-calendly .calendly-btn *{color:#0A1F33!important;}
  .cta-calendly .calendly-link{color:#A8DCEC!important;text-decoration:underline!important;}
  .print-footer-inline{display:flex!important;justify-content:space-between;align-items:center;margin-top:24px;padding:10px 0;border-top:1px solid #CDD9E3;font-size:9pt;color:#5F7388;page-break-before:avoid;}
  .print-footer-inline img{height:20px;width:auto;}
  .print-footer-inline-brand{display:flex;align-items:center;gap:10px;font-weight:600;}
  .print-footer-inline a{color:#2D7A8B!important;font-weight:700;text-decoration:underline;}
}
</style>

<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;
const IZZY_LOGO='data:image/png;base64,'+window.IZZY_LOGO_B64;
const Ico=({size=16,children,...p})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}} {...p}>{children}</svg>;

const c={bg:'#1B2838',card:'#243447',cardH:'#2C3E52',bdr:'#2E4A5F',acc:'#5BB8E8',accL:'#7DD3FC',accG:'linear-gradient(135deg,#5BB8E8,#7DD3FC)',w:'#FFFFFF',lt:'#C8D8E6',mt:'#8FA3B8',dn:'#E5484D',ok:'#34D399',ink:'#0A1F33',navy:'#06182A',cyan:'#A8DCEC'};

const fmtEUR=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Math.round(n));
const fmtNum=n=>new Intl.NumberFormat('fr-FR').format(Math.round(n));

const QS=[
  {id:'clients',th:'Portefeuille',t:'Combien de clients actifs avez-vous ?',ty:'c',o:[{l:'Moins de 50',v:30},{l:'50 à 200',v:125},{l:'200 à 500',v:350},{l:'500 à 1 000',v:750},{l:'1 000 à 1 500',v:1250},{l:'1 500 à 2 000',v:1750},{l:'Plus de 2 000',v:2500}]},
  {id:'concentration',th:'Dépendance',t:'Quel pourcentage de votre CA dépend de vos 10 plus gros clients ?',ty:'c',o:[{l:'Moins de 20 %',v:15,s:12},{l:'20 à 40 %',v:30,s:8},{l:'40 à 60 %',v:50,s:4},{l:'Plus de 60 %',v:70,s:1}]},
  {id:'contact',th:'Relation client',t:'À quelle fréquence vos clients sont-ils contactés de manière proactive ?',ty:'c',o:[{l:'Jamais',v:0,s:0},{l:'Uniquement en cas de problème',v:1,s:3},{l:'Quelques fois par an',v:2,s:7},{l:'Au moins 1 fois / trimestre',v:3,s:12}]},
  {id:'detection',th:'Anticipation',t:'Savez-vous identifier les clients qui risquent de partir ?',ty:'c',o:[{l:'Oui',v:2,s:12},{l:'Partiellement',v:1,s:6},{l:'Non',v:0,s:0}]},
  {id:'satisfaction',th:'Écoute client',t:'Mesurez-vous régulièrement la satisfaction de vos clients ?',ty:'c',o:[{l:'Oui',v:1,s:12},{l:'Non',v:0,s:0}]},
  {id:'crm',th:'Outils',t:'Disposez-vous d\'un CRM à jour avec l\'historique client ?',ty:'c',o:[{l:'Oui',v:2,s:12},{l:'Partiellement',v:1,s:6},{l:'Non',v:0,s:0}]},
  {id:'upsell',th:'Développement',t:'Avez-vous un processus pour détecter les opportunités d\'upsell / cross-sell ?',ty:'c',o:[{l:'Oui',v:2,s:13},{l:'Partiellement',v:1,s:6},{l:'Non',v:0,s:0}]},
  {id:'owner',th:'Organisation',t:'Qui est responsable de la fidélisation client ?',ty:'c',o:[{l:'Personne',v:0,s:0},{l:'Plusieurs personnes sans rôle défini',v:1,s:4},{l:'Un responsable identifié',v:2,s:9},{l:'Une équipe dédiée',v:3,s:13}]},
  {id:'lost',th:'Historique',t:'Combien de clients avez-vous perdu au cours des 12 derniers mois ?',ty:'n',ph:'Ex. : 12',sf:'clients perdus'},
  {id:'cause',th:'Analyse',t:'Quelle est la principale cause de départ de vos clients ?',ty:'c',o:[{l:'Fermeture / disparition de l\'entreprise cliente',v:'fermeture',s:10},{l:'Passage à la concurrence',v:'concurrence',s:2},{l:'Insatisfaction (qualité, service, réactivité)',v:'insatisfaction',s:0},{l:'Budget / réduction des coûts',v:'budget',s:6},{l:'Pas de suivi, le client s\'est éloigné',v:'inactivite',s:1},{l:'Je ne sais pas',v:'inconnu',s:0}]},
  {id:'revenue',th:'Chiffre d\'affaires',t:'Quel est votre chiffre d\'affaires annuel ?',ty:'n',ph:'Ex. : 1 500 000',sf:'€ / an'},
];

function calc(a){
  const cl=a.clients||125,co=a.concentration||30,lo=Math.max(0,Number(a.lost)||0),rv=Math.max(1,Number(a.revenue)||0);
  let sc=0;QS.forEach(q=>{if(q.ty==='c'&&q.id!=='clients'){const op=q.o.find(x=>x.v===a[q.id]);if(op&&op.s!=null)sc+=op.s;}});
  const oc=lo/Math.max(1,cl+lo);if(oc<.05)sc+=14;else if(oc<.1)sc+=10;else if(oc<.2)sc+=5;
  sc=Math.max(0,Math.min(100,Math.round(sc)));
  const cat=sc<30?{n:'Risque élevé',t:'danger'}:sc<50?{n:'Fragile',t:'warn'}:sc<70?{n:'Intermédiaire',t:'mid'}:sc<85?{n:'Structuré',t:'good'}:{n:'Excellence client',t:'great'};
  const f=sc<30?1.35:sc<50?1.15:sc<70?1:sc<85?.8:.6;
  let rr=lo>0?oc*f:((100-sc)/100)*.22;rr=Math.min(.45,Math.max(.02,rr));
  const car=Math.max(1,Math.round(cl*rr)),rar=rv*rr*(1+(co-30)/200);
  const up=a.upsell===2?6:a.upsell===1?10:14,cp=a.upsell===2?4:a.upsell===1?7:10;
  const uv=rv*(up/100),cv=rv*(cp/100),gl=(uv+cv)*.5,gh=uv+cv;
  const t1s=Math.min(.35,(co/100)*.3),t1r=rv*t1s,acr=rv/cl,ctr=Math.max(1,Math.ceil(t1r/acr));
  const ml=Math.min(24,Math.max(3,Math.round(ctr*1.2))),mh=Math.min(36,Math.max(ml+3,Math.round(ctr*2.2)));
  const risks=[],opps=[],acts=[];
  if(co>=50)risks.push({t:'Forte dépendance aux comptes clés',d:`${co>=70?'Plus de 60':'40 à 60'} % de votre CA repose sur 10 clients.`});
  if(a.detection===0||a.contact<=1)risks.push({t:'Churn subi, non anticipé',d:'Sans signaux d\'alerte ni contacts proactifs, les départs arrivent trop tard.'});
  if(a.satisfaction===0)risks.push({t:'Aucune mesure de satisfaction',d:'L\'insatisfaction s\'installe silencieusement avant le départ.'});
  if(a.cause==='concurrence'&&risks.length<3)risks.push({t:'Clients captés par la concurrence',d:'Vos clients partent chez un concurrent : l\'offre, le prix ou la relation ne suffit plus à les retenir.'});
  if(a.cause==='insatisfaction'&&risks.length<3)risks.push({t:'Insatisfaction non traitée',d:'Le motif principal de départ est l\'insatisfaction — un signal urgent à adresser.'});
  if(a.cause==='inactivite'&&risks.length<3)risks.push({t:'Clients perdus par absence de suivi',d:'Vos clients partent faute d\'attention. Un simple suivi régulier aurait pu les retenir.'});
  if(a.cause==='inconnu'&&risks.length<3)risks.push({t:'Causes de départ non identifiées',d:'Vous ne savez pas pourquoi vos clients partent — impossible d\'agir sans ce diagnostic.'});
  if(a.owner<=1&&risks.length<3)risks.push({t:'Fidélisation sans pilote',d:'La rétention est l\'affaire de tous, donc de personne.'});
  if(a.crm===0&&risks.length<3)risks.push({t:'Historique client non structuré',d:'Sans CRM, chaque interaction repart de zéro.'});
  if(!risks.length)risks.push({t:'Vigilance sur la durée',d:'Le principal risque est le relâchement des rituels de suivi.'});
  if(a.upsell!==2)opps.push({t:'Revenus dormants',d:`${up+cp} % de CA additionnel via upsell et cross-sell.`});
  if(a.contact<=2)opps.push({t:'Rituel de contact proactif',d:'Un point trimestriel réduit le churn.'});
  if(a.satisfaction===0)opps.push({t:'Boucle de feedback',d:'Un suivi de satisfaction transforme les insatisfaits en clients récupérés.'});
  if(opps.length<3&&a.crm!==2)opps.push({t:'CRM comme radar',d:'Un historique structuré repère inactivité et signaux de départ.'});
  if(opps.length<3)opps.push({t:'Capitaliser sur les fidèles',d:'Vos meilleurs clients sont votre canal d\'acquisition le moins cher.'});
  if(a.contact<=2)acts.push('Mettre en place un point trimestriel avec vos comptes stratégiques.');
  if(a.cause==='inconnu')acts.push('Interviewer les 5 derniers clients perdus pour identifier les vraies causes de départ.');
  if(a.cause==='concurrence')acts.push('Réaliser un benchmark concurrentiel (offre, prix, service) pour identifier vos écarts.');
  if(a.cause==='insatisfaction')acts.push('Lancer un plan d\'action qualité immédiat sur les irritants identifiés par vos clients.');
  if(a.cause==='inactivite')acts.push('Recontacter tous les clients sans interaction depuis plus de 60 jours.');
  if(a.detection!==2||a.crm!==2)acts.push('Identifier les clients inactifs depuis plus de 90 jours et les recontacter.');
  if(a.upsell!==2)acts.push('Structurer les opportunités d\'upsell et de cross-sell dans le CRM.');
  if(a.satisfaction===0)acts.push('Mettre en place un suivi de satisfaction régulier (NPS trimestriel).');
  if(a.owner<=1)acts.push('Définir clairement un responsable de la fidélisation client.');
  if(co>=50)acts.push('Bâtir un plan de compte pour vos 10 plus gros clients.');
  acts.push('Analyser les 5 derniers départs pour identifier les causes racines.');
  const causeLabels={fermeture:'fermeture d\'entreprise',concurrence:'passage à la concurrence',insatisfaction:'insatisfaction client',budget:'contraintes budgétaires',inactivite:'absence de suivi',inconnu:'causes non identifiées'};
  const causeLabel=causeLabels[a.cause]||'non précisées';
  const sy=[`Maturité fidélisation : ${sc}/100 — « ${cat.n} ».`,`${fmtNum(car)} clients à risque, soit ${fmtEUR(rar)} menacés sur 12 mois.`,`Principale cause de départ identifiée : ${causeLabel}.`,`Perte du plus gros client = ${fmtEUR(t1r)}, ${fmtNum(ctr)} nouveaux clients pour compenser.`,`Potentiel de ${fmtEUR(gl)} à ${fmtEUR(gh)} de revenus additionnels / an.`];
  return{sc,cat,cl,rv,rr,car,rar,uv,cv,up,cp,gl,gh,t1r,t1s,ctr,ml,mh,risks:risks.slice(0,3),opps:opps.slice(0,3),acts:acts.slice(0,5),sy};
}

const TONES={danger:{c:'#E5484D',bg:'rgba(229,72,77,.12)'},warn:{c:'#E8871E',bg:'rgba(232,135,30,.12)'},mid:{c:'#D6A319',bg:'rgba(214,163,25,.12)'},good:{c:'#2E90FA',bg:'rgba(46,144,250,.12)'},great:{c:'#12B76A',bg:'rgba(18,183,106,.12)'}};

async function generatePDF({lead,logoBase64}){
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4',compress:true});
  const W=210,H=297,M=12,CW=W-2*M,FOOTER=12,TOP=M,PCH=H-TOP-FOOTER;
  function drawFooter(pn){
    const fy=H-6;
    pdf.setDrawColor(205,217,227);pdf.setLineWidth(0.2);pdf.line(M,fy-3,W-M,fy-3);
    try{pdf.addImage(logoBase64,'PNG',M,fy-1.5,4,4);}catch(e){}
    pdf.setFont('helvetica','bold');pdf.setFontSize(7);pdf.setTextColor(95,115,136);
    pdf.text('Izzy All — Audit Churn & Fidélisation',M+5.5,fy+1);
    pdf.setTextColor(45,122,139);
    pdf.textWithLink('calendly.com/commercial-izzysales/30min',W-M-52,fy+1,{url:'https://calendly.com/commercial-izzysales/30min'});
    pdf.setTextColor(95,115,136);pdf.setFont('helvetica','normal');
    pdf.text(String(pn),W-M,fy+1,{align:'right'});
  }
  // Capture chaque page séparément → aucune coupure possible
  const pages=[document.getElementById('pdf-page-1'),document.getElementById('pdf-page-2')].filter(Boolean);
  if(!pages.length)return;
  document.body.classList.add('pdf-capturing');
  const saved=pages.map(p=>({w:p.style.width,mw:p.style.maxWidth}));
  pages.forEach(p=>{p.style.width='1180px';p.style.maxWidth='1180px';});
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>setTimeout(r,400));
  try{
    for(let i=0;i<pages.length;i++){
      const canvas=await window.html2canvas(pages[i],{scale:2,backgroundColor:'#FFFFFF',logging:false,useCORS:true,letterRendering:true,windowWidth:1200});
      if(i>0)pdf.addPage();
      const pxMm=canvas.width/CW;
      let imgH=canvas.height/pxMm;
      let imgW=CW;
      // Si la page dépasse la hauteur A4, on réduit proportionnellement pour tenir sur la page
      if(imgH>PCH){const ratio=PCH/imgH;imgH=PCH;imgW=CW*ratio;}
      const x=M+(CW-imgW)/2;
      pdf.addImage(canvas.toDataURL('image/jpeg',0.93),'JPEG',x,TOP,imgW,imgH);
      drawFooter(i+1);
    }
  }finally{
    document.body.classList.remove('pdf-capturing');
    pages.forEach((p,i)=>{p.style.width=saved[i].w;p.style.maxWidth=saved[i].mw;});
  }
  pdf.save(`Audit-Churn-Izzy-All-${(lead.company||'Rapport').replace(/[^a-zA-Z0-9\-_]/g,'_')}.pdf`);
}

const Gauge=({score,tone})=>{const a=(score/100)*180,r=84,rd=((180-a)*Math.PI)/180,ex=100+r*Math.cos(rd),ey=100-r*Math.sin(rd);return<svg viewBox="0 0 200 118" style={{width:'100%',maxWidth:200}}><path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke="#2E4A5F" strokeWidth="12" strokeLinecap="round"/>{score>0&&<path d={`M 16 100 A 84 84 0 ${a>180?1:0} 1 ${ex} ${ey}`} fill="none" stroke={tone.c} strokeWidth="12" strokeLinecap="round"/>}<text x="100" y="86" textAnchor="middle" style={{font:`800 38px ${F.d}`,fill:c.w}}>{score}</text><text x="100" y="108" textAnchor="middle" style={{font:`600 10px ${F.s}`,fill:c.mt,letterSpacing:'.1em'}}>SCORE / 100</text></svg>;};
